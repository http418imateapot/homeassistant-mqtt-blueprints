changelog:
  categories:
    - title: "Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "Fixes"
      labels:
        - "fix"
        - "bug"
    - title: "Documentation"
      labels:
        - "documentation"
        - "docs"
    - title: "Maintenance"
      labels:
        - "chore"
        - "refactor"
  exclude:
    labels:
      - "skip-changelog"
    authors:
      - "github-actions[bot]"
