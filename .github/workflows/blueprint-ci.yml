name: Blueprint CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'mqtt_*.yaml'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'VERSION'
      - '.github/release.yml'
      - '.github/workflows/blueprint-ci.yml'
      - '.github/workflows/release.yml'
      - '.yamllint'
  push:
    branches:
      - main
      - develop
    paths:
      - 'mqtt_*.yaml'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'VERSION'
      - '.github/release.yml'
      - '.github/workflows/blueprint-ci.yml'
      - '.github/workflows/release.yml'
      - '.yamllint'

jobs:
  validate-blueprints:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml yamllint

      - name: Lint YAML
        run: |
          yamllint -c .yamllint mqtt_telemetry_uploader.yaml mqtt_command_receiver.yaml .github/release.yml .github/workflows/blueprint-ci.yml .github/workflows/release.yml

      - name: Check Python syntax
        run: |
          python -m py_compile tools/check_blueprints.py

      - name: Validate blueprint structure
        run: |
          python ./tools/check_blueprints.py
