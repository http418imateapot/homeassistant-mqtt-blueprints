name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-release:
    # Run on semantic version tag push (v1.0.0)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync sw_version from VERSION file
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          sed -i "s/'sw_version': '[^']*'/'sw_version': '${VERSION}'/g" mqtt_telemetry_uploader.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mqtt_telemetry_uploader.yaml
          git diff --cached --quiet || git commit -m "chore: sync sw_version to ${VERSION} [skip ci]"
          git push origin HEAD:main || echo "Push skipped (branch protection rules may apply; update sw_version manually if needed)."

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
