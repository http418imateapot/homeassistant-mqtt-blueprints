name: Feature request
description: Suggest an improvement
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve this project.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe your proposed behavior or design
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
