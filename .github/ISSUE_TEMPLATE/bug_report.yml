name: Bug report
description: Report a problem with a blueprint
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: 2026.6.0
    validations:
      required: true
  - type: input
    id: blueprint
    attributes:
      label: Blueprint file
      placeholder: mqtt_telemetry_uploader.yaml or mqtt_command_receiver.yaml
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Describe exact steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets before posting.
