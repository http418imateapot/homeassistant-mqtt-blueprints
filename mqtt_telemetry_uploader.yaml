blueprint:
  name: Universal Local-First MQTT Telemetry Uploader
  description: >
    Monitor selected Home Assistant entities and publish grouped telemetry to MQTT.
    Topic format: {mqtt_base_topic}/telemetry/{domain}
    Payload fields: timestamp, area, trigger_reason, sample_type, telemetries.
    Publishes Home Assistant MQTT Discovery configs (retained) for selected entities.
  domain: automation
  source_url: https://raw.githubusercontent.com/http418imateapot/homeassistant-mqtt-blueprints/main/mqtt_telemetry_uploader.yaml

  input:
    mqtt_base_topic:
      name: MQTT Base Topic
      description: "Base topic for outgoing telemetry. Do not include leading or trailing slashes or spaces. Example: homeassistant"
      default: homeassistant
      selector:
        text:

    heartbeat_minutes:
      name: Heartbeat Interval (minutes)
      description: "Periodic publish interval for non-stateful sensors. Uses HA time_pattern minutes syntax. Predefined options: /1, /5, /10, /30. Custom values are also accepted (e.g. /15)."
      default: "/1"
      selector:
        select:
          options:
            - "/1"
            - "/5"
            - "/10"
            - "/30"
          custom_value: true

    mqtt_discovery_prefix:
      name: MQTT Discovery Prefix
      description: Discovery base prefix used for retained config topics.
      default: homeassistant
      selector:
        text:

    light_entities:
      name: "[LIGHT] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: light

    switch_entities:
      name: "[SWITCH] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: switch

    sensor_entities:
      name: "[SENSOR] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: sensor

    binary_sensor_entities:
      name: "[BINARY_SENSOR] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: binary_sensor

    climate_entities:
      name: "[CLIMATE] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: climate

    cover_entities:
      name: "[COVER] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: cover

    fan_entities:
      name: "[FAN] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: fan

    lock_entities:
      name: "[LOCK] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: lock

mode: parallel
max: 20

variables:
  _base_topic: !input mqtt_base_topic
  _heartbeat_minutes: !input heartbeat_minutes
  _discovery_prefix: !input mqtt_discovery_prefix
  _lights: !input light_entities
  _switches: !input switch_entities
  _sensors: !input sensor_entities
  _binary_sensors: !input binary_sensor_entities
  _climates: !input climate_entities
  _covers: !input cover_entities
  _fans: !input fan_entities
  _locks: !input lock_entities
  _qos: "1"
  _retain: false
  _discovery_retain: true
  _all_entities: >
    {{
      (
        (_lights | default([], true))
        + (_switches | default([], true))
        + (_sensors | default([], true))
        + (_binary_sensors | default([], true))
        + (_climates | default([], true))
        + (_covers | default([], true))
        + (_fans | default([], true))
        + (_locks | default([], true))
      )
      | unique
      | list
    }}

trigger:
  - platform: state
    entity_id: !input light_entities
    id: state_changed
  - platform: state
    entity_id: !input switch_entities
    id: state_changed
  - platform: state
    entity_id: !input sensor_entities
    id: state_changed
  - platform: state
    entity_id: !input binary_sensor_entities
    id: state_changed
  - platform: state
    entity_id: !input climate_entities
    id: state_changed
  - platform: state
    entity_id: !input cover_entities
    id: state_changed
  - platform: state
    entity_id: !input fan_entities
    id: state_changed
  - platform: state
    entity_id: !input lock_entities
    id: state_changed
  - platform: time_pattern
    minutes: !input heartbeat_minutes
    id: heartbeat

condition: []

action:
  - repeat:
      for_each: "{{ _all_entities }}"
      sequence:
        - variables:
            _entity_id: "{{ repeat.item }}"
            _domain: "{{ (_entity_id.split('.')[0]) if ('.' in _entity_id) else '' }}"
            _object_id: "{{ (_entity_id.split('.')[1]) if ('.' in _entity_id) else _entity_id }}"
            _area: "{{ area_name(_entity_id) }}"
            _state_topic: "{{ _base_topic }}/telemetry/{{ _domain }}"
            _availability_topic: "{{ _base_topic }}/telemetry/availability"
            _entity_name: "{{ state_attr(_entity_id, 'friendly_name') | default(_entity_id, true) }}"
            _unit: "{{ state_attr(_entity_id, 'unit_of_measurement') | default(none, true) }}"
            _discovery_component: >
              {% if _domain == 'binary_sensor' %}
                binary_sensor
              {% elif _domain in ['sensor', 'light', 'switch', 'climate', 'cover', 'fan', 'lock'] %}
                sensor
              {% else %}
                {{ '' }}
              {% endif %}
            _metric_name: "{{ 'hvac_mode' if _domain == 'climate' else 'state' }}"
            _discovery_topic: >
              {% if _discovery_component != '' %}
                {{ _discovery_prefix }}/{{ _discovery_component }}/mqtt_bridge/{{ _domain }}_{{ _object_id }}/config
              {% else %}
                {{ '' }}
              {% endif %}
            _capability_topic: "{{ _base_topic }}/telemetry/capabilities/{{ _entity_id | replace('.', '/') }}"
            _is_writable: "{{ _domain in ['switch', 'light', 'climate', 'cover', 'fan', 'lock'] }}"

        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ _discovery_component | trim != '' and _discovery_topic | trim | length > 0 and trigger.id == 'heartbeat' }}"
              sequence:
                - service: mqtt.publish
                  data:
                    qos: "{{ _qos }}"
                    retain: "{{ _discovery_retain }}"
                    topic: "{{ _discovery_topic }}"
                    payload: >
                      {% if _domain == 'sensor' and _unit is not none and (_unit | string) not in ['none', 'None', ''] %}
                        {{ {
                          'name': _entity_name,
                          'unique_id': ('mqtt_bridge_' ~ _entity_id | replace('.', '_')),
                          'state_topic': _state_topic,
                          'availability_topic': _availability_topic,
                          'payload_available': 'online',
                          'payload_not_available': 'offline',
                          'value_template': "{{ (value_json.telemetries | selectattr('entity','equalto','" ~ _entity_id ~ "') | selectattr('name','equalto','" ~ _metric_name ~ "') | map(attribute='value') | list | first) }}",
                          'json_attributes_topic': _capability_topic,
                          'unit_of_measurement': (_unit | string),
                          'device': {
                            'identifiers': ['mqtt_bridge_homeassistant'],
                            'name': 'MQTT Bridge Home Assistant',
                            'manufacturer': 'homeassistant-mqtt-blueprints',
                            'model': 'universal-local-first-bridge'
                          },
                          'origin': {
                            'name': 'homeassistant-mqtt-blueprints',
                            'sw_version': '2.2.0'
                          },
                          'object_id': (_domain ~ '_' ~ _object_id)
                        } | tojson }}
                      {% else %}
                        {{ {
                          'name': _entity_name,
                          'unique_id': ('mqtt_bridge_' ~ _entity_id | replace('.', '_')),
                          'state_topic': _state_topic,
                          'availability_topic': _availability_topic,
                          'payload_available': 'online',
                          'payload_not_available': 'offline',
                          'value_template': "{{ (value_json.telemetries | selectattr('entity','equalto','" ~ _entity_id ~ "') | selectattr('name','equalto','" ~ _metric_name ~ "') | map(attribute='value') | list | first) }}",
                          'json_attributes_topic': _capability_topic,
                          'device': {
                            'identifiers': ['mqtt_bridge_homeassistant'],
                            'name': 'MQTT Bridge Home Assistant',
                            'manufacturer': 'homeassistant-mqtt-blueprints',
                            'model': 'universal-local-first-bridge'
                          },
                          'origin': {
                            'name': 'homeassistant-mqtt-blueprints',
                            'sw_version': '2.2.0'
                          },
                          'object_id': (_domain ~ '_' ~ _object_id)
                        } | tojson }}
                      {% endif %}

                - service: mqtt.publish
                  data:
                    qos: "{{ _qos }}"
                    retain: "{{ _discovery_retain }}"
                    topic: "{{ _capability_topic }}"
                    payload: >
                      {{ {
                        'entity': _entity_id,
                        'domain': _domain,
                        'area': _area,
                        'read_contract': {
                          'state_topic': _state_topic,
                          'metric': _metric_name,
                          'payload_schema': {
                            'sample_type': ['event', 'heartbeat'],
                            'fields': ['timestamp', 'area', 'trigger_reason', 'sample_type', 'telemetries']
                          }
                        },
                        'write_contract': (
                          {
                            'schema': 'v2',
                            'command_topic': _base_topic ~ '/commands',
                            'envelope': ['service', 'target', 'data'],
                            'service_domain': _domain,
                            'target_fields': ['entity_id', 'area_id']
                          }
                          if _is_writable else
                          {
                            'schema': none,
                            'command_topic': none,
                            'envelope': [],
                            'service_domain': none,
                            'target_fields': []
                          }
                        )
                      } | tojson }}

  - variables:
      _groups_json: >
        {% set ns = namespace(groups = []) %}
        {% for e in _all_entities %}
          {% if e %}
            {% set domain = (e.split('.')[0]) if ('.' in e) else '' %}
            {% set entity_area = area_name(e) %}
            {% set key = (entity_area | string) ~ '||' ~ domain %}
            {% if domain != '' %}
              {% set item = {'entity': e, 'domain': domain} %}
              {% set matches = ns.groups | selectattr('key', 'equalto', key) | list %}
              {% set current = matches[0] if matches | count > 0 else none %}
              {% set cur = {
                'key': key,
                'area': entity_area,
                'domain': domain,
                'items': (current['items'] if current is not none else []) + [item]
              } %}
              {% set ns.groups = (ns.groups | rejectattr('key', 'equalto', key) | list) + [cur] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.groups }}

  - service: system_log.write
    data:
      level: warning
      message: >
        [MQTT_Bridge] grouped entities count={{ _groups_json | count }}

  - repeat:
      for_each: "{{ _groups_json }}"
      sequence:
        - variables:
            _group: "{{ repeat.item }}"
            _domain: "{{ _group.domain }}"
            _area: "{{ _group.area }}"
            _items: "{{ _group['items'] }}"
            _publish_group: >
              {% set entities_in_group = _group['items'] | map(attribute='entity') | list %}
              {{ trigger.id == 'heartbeat' or (trigger.id == 'state_changed' and trigger.entity_id in entities_in_group) }}
            _telemetries_json: >
              {% set ns = namespace(items = []) %}
              {% for i in _items %}
                {% set friendly_name = state_attr(i.entity, 'friendly_name') | default(i.entity, true) | string %}
                {% set unit = state_attr(i.entity, 'unit_of_measurement') | default(none, true) %}
                {% set state = states(i.entity) %}
                {% if i.domain in ['light', 'switch', 'sensor', 'binary_sensor', 'lock'] %}
                  {% set parsed = state | float(none) %}
                  {% set ns.items = ns.items + [{
                    'name': 'state',
                    'value': (
                      none if state in ['none', 'unavailable', 'unknown', None]
                      else (parsed if i.domain == 'sensor' and parsed is not none else state)
                    ),
                    'entity': i.entity,
                    'friendly_name': friendly_name,
                    'domain': i.domain,
                    'unit': (unit if i.domain == 'sensor' else none)
                  }] %}
                {% elif i.domain == 'climate' %}
                  {% set hvac_mode = state if state not in ['none', 'unavailable', 'unknown', None] else none %}
                  {% set temp = state_attr(i.entity, 'temperature') %}
                  {% set temp_unit = state_attr(i.entity, 'temperature_unit') %}
                  {% if hvac_mode is not none %}
                    {% set ns.items = ns.items + [{
                      'name': 'hvac_mode',
                      'value': hvac_mode,
                      'entity': i.entity,
                      'friendly_name': friendly_name,
                      'domain': i.domain,
                      'unit': none
                    }] %}
                  {% endif %}
                  {% if temp is not none %}
                    {% set ns.items = ns.items + [{
                      'name': 'temperature',
                      'value': (temp | float(none)),
                      'entity': i.entity,
                      'friendly_name': friendly_name,
                      'domain': i.domain,
                      'unit': (temp_unit | string if temp_unit is not none else none)
                    }] %}
                  {% endif %}
                {% elif i.domain == 'cover' %}
                  {% set cover_state = state if state not in ['none', 'unavailable', 'unknown', None] else none %}
                  {% if cover_state is not none %}
                    {% set ns.items = ns.items + [{
                      'name': 'state',
                      'value': cover_state,
                      'entity': i.entity,
                      'friendly_name': friendly_name,
                      'domain': i.domain,
                      'unit': none
                    }] %}
                  {% endif %}
                  {% set position = state_attr(i.entity, 'current_position') %}
                  {% if position is not none %}
                    {% set ns.items = ns.items + [{
                      'name': 'position',
                      'value': (position | int(none)),
                      'entity': i.entity,
                      'friendly_name': friendly_name,
                      'domain': i.domain,
                      'unit': '%'
                    }] %}
                  {% endif %}
                {% elif i.domain == 'fan' %}
                  {% set fan_state = state if state not in ['none', 'unavailable', 'unknown', None] else none %}
                  {% if fan_state is not none %}
                    {% set ns.items = ns.items + [{
                      'name': 'state',
                      'value': fan_state,
                      'entity': i.entity,
                      'friendly_name': friendly_name,
                      'domain': i.domain,
                      'unit': none
                    }] %}
                  {% endif %}
                  {% set percentage = state_attr(i.entity, 'percentage') %}
                  {% if percentage is not none %}
                    {% set ns.items = ns.items + [{
                      'name': 'percentage',
                      'value': (percentage | int(none)),
                      'entity': i.entity,
                      'friendly_name': friendly_name,
                      'domain': i.domain,
                      'unit': '%'
                    }] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.items | tojson }}

        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ _publish_group }}"
              sequence:
                - service: mqtt.publish
                  data:
                    qos: "{{ _qos }}"
                    retain: "{{ _retain }}"
                    topic: "{{ _base_topic }}/telemetry/{{ _domain }}"
                    payload: >
                      {{ {
                        'timestamp': utcnow().strftime('%Y-%m-%dT%H:%M:%S.%fZ'),
                        'area': _area,
                        'trigger_reason': trigger.id,
                        'sample_type': ('heartbeat' if trigger.id == 'heartbeat' else 'event'),
                        'telemetries': (_telemetries_json | from_json)
                      } | tojson }}

  - service: mqtt.publish
    data:
      qos: "{{ _qos }}"
      retain: "{{ _discovery_retain }}"
      topic: "{{ _base_topic }}/telemetry/availability"
      payload: "online"
