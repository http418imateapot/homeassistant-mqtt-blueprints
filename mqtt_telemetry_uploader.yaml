blueprint:
  name: Universal Local-First MQTT Telemetry Uploader
  description: >
    Monitor selected Home Assistant entities and publish grouped telemetry to MQTT.
    Topic format: {mqtt_base_topic}/telemetry/{domain}
    Payload fields: timestamp, area, trigger_reason, sample_type, telemetries
  domain: automation
  source_url: https://raw.githubusercontent.com/http418imateapot/homeassistant-mqtt-blueprints/main/mqtt_telemetry_uploader.yaml

  input:
    mqtt_base_topic:
      name: MQTT Base Topic
      description: Base topic for outgoing telemetry.
      default: homeassistant
      selector:
        text:

    heartbeat_minutes:
      name: Heartbeat Interval (minutes)
      description: Periodic publish interval for non-stateful sensors.
      default: "/1"
      selector:
        select:
          options:
            - "/1"
            - "/5"
            - "/10"
            - "/30"

    light_entities:
      name: "[LIGHT] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: light

    switch_entities:
      name: "[SWITCH] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: switch

    sensor_entities:
      name: "[SENSOR] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: sensor

    binary_sensor_entities:
      name: "[BINARY_SENSOR] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: binary_sensor

    climate_entities:
      name: "[CLIMATE] Entities"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            domain: climate

mode: parallel
max: 20

variables:
  _base_topic: !input mqtt_base_topic
  _heartbeat_minutes: !input heartbeat_minutes
  _lights: !input light_entities
  _switches: !input switch_entities
  _sensors: !input sensor_entities
  _binary_sensors: !input binary_sensor_entities
  _climates: !input climate_entities
  _qos: "1"
  _retain: false
  _all_entities: >
    {{
      (
        (_lights | default([], true))
        + (_switches | default([], true))
        + (_sensors | default([], true))
        + (_binary_sensors | default([], true))
        + (_climates | default([], true))
      )
      | unique
      | list
    }}

trigger:
  - platform: state
    entity_id: !input light_entities
    id: state_changed
  - platform: state
    entity_id: !input switch_entities
    id: state_changed
  - platform: state
    entity_id: !input sensor_entities
    id: state_changed
  - platform: state
    entity_id: !input binary_sensor_entities
    id: state_changed
  - platform: state
    entity_id: !input climate_entities
    id: state_changed
  - platform: time_pattern
    minutes: !input heartbeat_minutes
    id: heartbeat

condition: []

action:
  - variables:
      _groups_json: >
        {% set ns = namespace(groups = []) %}
        {% for e in _all_entities %}
          {% if e %}
            {% set domain = (e.split('.')[0]) if ('.' in e) else '' %}
            {% set entity_area = area_name(e) %}
            {% set key = (entity_area | string) ~ '||' ~ domain %}
            {% if domain != '' %}
              {% set item = {'entity': e, 'domain': domain} %}
              {% set matches = ns.groups | selectattr('key', 'equalto', key) | list %}
              {% set current = matches[0] if matches | count > 0 else none %}
              {% set cur = {
                'key': key,
                'area': entity_area,
                'domain': domain,
                'items': (current['items'] if current is not none else []) + [item]
              } %}
              {% set ns.groups = (ns.groups | rejectattr('key', 'equalto', key) | list) + [cur] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.groups }}

  - service: system_log.write
    data:
      level: warning
      message: >
        [MQTT_Bridge] grouped entities count={{ _groups_json | count }}

  - repeat:
      for_each: "{{ _groups_json }}"
      sequence:
        - variables:
            _group: "{{ repeat.item }}"
            _domain: "{{ _group.domain }}"
            _area: "{{ _group.area }}"
            _items: "{{ _group['items'] }}"
            _publish_group: >
              {% set entities_in_group = _group['items'] | map(attribute='entity') | list %}
              {{ trigger.id == 'heartbeat' or (trigger.id == 'state_changed' and trigger.entity_id in entities_in_group) }}
            _telemetries_json: >
              {% set ns = namespace(items = []) %}
              {% for i in _items %}
                {% set friendly_name = state_attr(i.entity, 'friendly_name') | default(i.entity, true) | string %}
                {% set unit = state_attr(i.entity, 'unit_of_measurement') | default(none, true) %}
                {% set state = states(i.entity) %}
                {% if i.domain in ['light', 'switch', 'sensor', 'binary_sensor'] %}
                  {% set parsed = state | float(none) %}
                  {% set ns.items = ns.items + [{
                    'name': 'state',
                    'value': (
                      none if state in ['none', 'unavailable', 'unknown', None]
                      else (parsed if i.domain == 'sensor' and parsed is not none else state)
                    ),
                    'entity': i.entity,
                    'friendly_name': friendly_name,
                    'domain': i.domain,
                    'unit': (unit if i.domain == 'sensor' else none)
                  }] %}
                {% elif i.domain == 'climate' %}
                  {% set hvac_mode = state if state not in ['none', 'unavailable', 'unknown', None] else none %}
                  {% set temp = state_attr(i.entity, 'temperature') %}
                  {% set temp_unit = state_attr(i.entity, 'temperature_unit') %}
                  {% if hvac_mode is not none %}
                    {% set ns.items = ns.items + [{
                      'name': 'hvac_mode',
                      'value': hvac_mode,
                      'entity': i.entity,
                      'friendly_name': friendly_name,
                      'domain': i.domain,
                      'unit': none
                    }] %}
                  {% endif %}
                  {% if temp is not none %}
                    {% set ns.items = ns.items + [{
                      'name': 'temperature',
                      'value': (temp | float(none)),
                      'entity': i.entity,
                      'friendly_name': friendly_name,
                      'domain': i.domain,
                      'unit': (temp_unit | string if temp_unit is not none else none)
                    }] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.items | tojson }}

        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ _publish_group }}"
              sequence:
                - service: mqtt.publish
                  data:
                    qos: "{{ _qos }}"
                    retain: "{{ _retain }}"
                    topic: "{{ _base_topic }}/telemetry/{{ _domain }}"
                    payload: >
                      {{ {
                        'timestamp': utcnow().strftime('%Y-%m-%dT%H:%M:%S.%fZ'),
                        'area': _area,
                        'trigger_reason': trigger.id,
                        'sample_type': ('heartbeat' if trigger.id == 'heartbeat' else 'event'),
                        'telemetries': (_telemetries_json | from_json)
                      } | tojson }}
